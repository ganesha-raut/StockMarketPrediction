{% extends "admin/dashboard.html" %}
{% block title %}Manage Stocks - Admin{% endblock %}

{% block content %}
<div class="container-fluid py-4" style="background: #f8f9fa; min-height: 100vh;">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-chart-line text-primary me-2"></i>Manage Stocks</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStockModal">
                <i class="fas fa-plus me-2"></i>Add New Stock
            </button>
        </div>
        
        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="stocksTable">
                        <thead class="table-dark">
                            <tr>
                                <th>Symbol</th>
                                <th>Name</th>
                                <th>Model Status</th>
                                <th>Last Trained</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stocksTableBody">
                            <tr>
                                <td colspan="6" class="text-center">
                                    <div class="spinner-border text-primary"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Stock Modal -->
<div class="modal fade" id="addStockModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Stock</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addStockForm">
                    <div class="mb-3">
                        <label class="form-label">Stock Symbol</label>
                        <input type="text" class="form-control" id="stockSymbol" required>
                        <small class="text-muted">e.g., TATAMOTORS, WIPRO</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" class="form-control" id="stockName" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addStock()">Add Stock</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
{{ super() }}
<script>
$(document).ready(function() {
    loadStocks();
});

function loadStocks() {
    $.get('/admin/api/stocks', function(response) {
        if (response.success) {
            let html = '';
            response.data.forEach(stock => {
                const modelBadge = stock.has_model ? 
                    '<span class="badge bg-success">✓ Trained</span>' : 
                    '<span class="badge bg-warning">Not Trained</span>';
                const statusBadge = stock.is_active ? 
                    '<span class="badge bg-primary">Active</span>' : 
                    '<span class="badge bg-secondary">Inactive</span>';
                    
                html += `
                    <tr>
                        <td><strong>${stock.symbol}</strong></td>
                        <td>${stock.name}</td>
                        <td>${modelBadge}</td>
                        <td>${stock.last_trained || 'Never'}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="trainModel(${stock.id}, '${stock.symbol}')">
                                <i class="fas fa-brain"></i> Train
                            </button>
                            <button class="btn btn-sm btn-${stock.is_active ? 'warning' : 'success'}" 
                                    onclick="toggleStatus(${stock.id})">
                                <i class="fas fa-${stock.is_active ? 'pause' : 'play'}"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            $('#stocksTableBody').html(html);
        }
    });
}

function addStock() {
    const symbol = $('#stockSymbol').val().toUpperCase();
    const name = $('#stockName').val();
    
    if (!symbol || !name) {
        showToast('Please fill all fields', 'warning');
        return;
    }
    
    $.ajax({
        url: '/admin/api/stock/add',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({symbol, name}),
        success: function(response) {
            if (response.success) {
                showToast('Stock added successfully!', 'success');
                $('#addStockModal').modal('hide');
                $('#addStockForm')[0].reset();
                loadStocks();
            } else {
                showToast(response.message, 'danger');
            }
        }
    });
}

function trainModel(stockId, symbol) {
    if (!confirm(`Train model for ${symbol}? This may take 2-3 minutes.`)) {
        return;
    }
    
    showToast(`Training model for ${symbol}...`, 'info');
    
    $.ajax({
        url: '/admin/api/stock/train-model',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({stock_id: stockId}),
        success: function(response) {
            if (response.success) {
                showToast('Model trained successfully!', 'success');
                loadStocks();
            } else {
                showToast('Training failed: ' + response.message, 'danger');
            }
        },
        error: function() {
            showToast('Training failed. Use Python script instead.', 'danger');
        }
    });
}

function toggleStatus(stockId) {
    $.ajax({
        url: '/admin/api/stock/toggle-status',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({stock_id: stockId}),
        success: function(response) {
            if (response.success) {
                showToast('Status updated', 'success');
                loadStocks();
            }
        }
    });
}
</script>
{% endblock %}
